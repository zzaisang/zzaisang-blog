name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# GITHUB_TOKEN 에 Pages 배포 권한 부여
permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 1건만 허용(진행 중 배포는 취소하지 않음)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          # 저장소 Variables 에 설정한 값 사용. PUBLIC_SITE_URL 미설정 시 Pages origin 으로 대체.
          PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL || steps.pages.outputs.origin }}
          # Pages 가 알려주는 base 경로(프로젝트 사이트면 /repo, 커스텀 도메인이면 /)를 자동 주입
          PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}
          PUBLIC_ADSENSE_CLIENT: ${{ vars.PUBLIC_ADSENSE_CLIENT }}
          PUBLIC_ADSENSE_SLOT_ARTICLE: ${{ vars.PUBLIC_ADSENSE_SLOT_ARTICLE }}
          PUBLIC_GOOGLE_SITE_VERIFICATION: ${{ vars.PUBLIC_GOOGLE_SITE_VERIFICATION }}
          PUBLIC_NAVER_SITE_VERIFICATION: ${{ vars.PUBLIC_NAVER_SITE_VERIFICATION }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
